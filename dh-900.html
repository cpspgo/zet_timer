<style>
  .timer-wrap * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .timer-wrap {
    font-family:
      -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      sans-serif;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: clamp(18px, 4vw, 30px) 0 0 0;
    background: linear-gradient(
      180deg,
      #fbf4ea 0%,
      #fcf7f0 22%,
      #ffffff 58%,
      #ffffff 100%
    );
  }

  .timer-container {
    text-align: center;
    padding: 0 clamp(16px, 5vw, 32px) 0;
    width: 100%;
    max-width: 480px;
  }

  .viewer-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: fit-content;
    max-width: 100%;
    margin: 0 auto 12px;
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: clamp(12px, 3.1vw, 14px);
    color: #6b7280;
    font-weight: 600;
    box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
    backdrop-filter: blur(6px);
    flex-wrap: wrap;
    row-gap: 2px;
  }

  .viewer-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    animation: twDotPulse 1.6s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes twDotPulse {
    0%,
    100% {
      opacity: 1;
      transform: scale(1);
    }
    50% {
      opacity: 0.55;
      transform: scale(1.45);
    }
  }

  @keyframes twFadeNum {
    0% {
      opacity: 0.25;
      transform: translateY(-2px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .viewer-count-anim {
    display: inline-block;
    animation: twFadeNum 0.35s ease;
  }

  .viewer-badge strong#tw-viewer-count {
    font-size: 17px;
    font-weight: 900;
    color: #111827;
    letter-spacing: -0.2px;
    margin-right: 4px;
  }

  .sale-badge {
    display: block;
    width: fit-content;
    margin: 0 auto 10px;
    background: #ef5a6f;
    color: #fff;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.6px;
    box-shadow: 0 12px 24px rgba(239, 90, 111, 0.18);
  }

  .title {
    font-size: clamp(20px, 5.4vw, 24px);
    font-weight: 900;
    color: #111827;
    letter-spacing: -0.6px;
    margin-bottom: 16px;
  }

  .countdown {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(6px, 2vw, 10px);
    margin-bottom: 14px;
    flex-wrap: nowrap;
  }
  .time-box {
    background: #ffffff;
    border-radius: 18px;
    padding: clamp(10px, 2.6vw, 14px) clamp(12px, 3.2vw, 18px);
    min-width: clamp(54px, 14vw, 72px);
    box-shadow: 0 16px 30px rgba(15, 23, 42, 0.1);
    border: 1px solid rgba(15, 23, 42, 0.06);
    flex-shrink: 0;
  }
  .time-number {
    font-size: clamp(31px, 8.8vw, 44px);
    font-weight: 900;
    color: #ef5a6f;
    line-height: 1;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .colon {
    font-size: clamp(22px, 6.3vw, 30px);
    color: rgba(239, 90, 111, 0.55);
    font-weight: 400;
    margin-bottom: 2px;
    flex-shrink: 0;
  }
  .time-box.tenth {
    background: #ef5a6f;
    border-radius: 18px;
    padding: clamp(10px, 2.6vw, 14px) clamp(12px, 3.2vw, 16px);
    min-width: clamp(44px, 11vw, 58px);
    box-shadow: 0 16px 30px rgba(239, 90, 111, 0.2);
    border: 1px solid rgba(239, 90, 111, 0.25);
  }
  .time-box.tenth .time-number {
    font-size: clamp(27px, 7.4vw, 38px);
    color: #fff;
    letter-spacing: -0.8px;
  }

  .price-warning {
    font-size: clamp(12px, 3.2vw, 13.5px);
    color: #ef5a6f;
    font-weight: 800;
    margin-bottom: 14px;
    letter-spacing: -0.2px;
    background: transparent;
  }

  .card-soft {
    background: #fafafa;
    border: none !important;
    box-shadow: none !important;
  }

  .card-wide {
    width: calc(100% + 36px);
    margin-left: -18px;
    margin-right: -18px;
    margin-bottom: 14px;
    padding: 0 6px;
  }
  .card-wide > .card-inner {
    border-radius: 22px;
    padding: 16px 18px;
  }

  .stock-warning-title {
    font-size: 15px;
    font-weight: 900;
    color: #111827;
    margin-bottom: 6px;
  }
  .stock-warning-title .stock-count {
    color: #ef5a6f;
    font-weight: 900;
  }
  .stock-warning-sub {
    font-size: 13px;
    color: #9aa0a6;
    font-weight: 700;
  }

  .satisfaction-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .satisfaction-title {
    font-size: 15px;
    font-weight: 900;
    color: #111827;
  }
  .satisfaction-badge {
    font-size: 12px;
    font-weight: 800;
    color: #ff6b35;
  }

  .satisfaction-row {
    margin-bottom: 12px;
  }
  .satisfaction-row:last-child {
    margin-bottom: 0;
  }

  .satisfaction-label-row {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    margin-bottom: 6px;
  }
  .satisfaction-label {
    font-size: 13px;
    font-weight: 800;
    color: #374151;
  }

  .satisfaction-bar {
    width: 100%;
    height: 10px;
    background: #ededed;
    border-radius: 999px;
    overflow: hidden;
  }
  .satisfaction-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ffd000 0%, #ffa800 100%);
    border-radius: 999px;
    transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @media (max-width: 380px) {
    .card-wide {
      width: calc(100% + 16px);
      margin-left: -8px;
      margin-right: -8px;
      padding: 0 2px;
    }
    .card-wide > .card-inner {
      padding: 14px 14px;
    }
  }
</style>

<div class="timer-wrap">
  <div class="timer-container">
    <div class="viewer-badge">
      <span class="viewer-dot"></span>
      <span
        >실시간 <strong id="tw-viewer-count">1,422</strong>명이 대한한우에서
        쇼핑 중</span
      >
    </div>

    <div class="sale-badge">TIME SALE</div>
    <div class="title">오늘만 특가 마감임박</div>

    <div class="countdown">
      <div class="time-box">
        <div class="time-number" id="tw-hours">00</div>
      </div>
      <div class="colon">:</div>
      <div class="time-box">
        <div class="time-number" id="tw-minutes">00</div>
      </div>
      <div class="colon">:</div>
      <div class="time-box">
        <div class="time-number" id="tw-seconds">00</div>
      </div>
      <div class="colon">:</div>
      <div class="time-box tenth">
        <div class="time-number" id="tw-tenth">9</div>
      </div>
    </div>

    <div class="price-warning">⚡ 특가 종료 후, 가격인상될 수 있습니다!</div>

    <div class="card-wide">
      <div class="card-inner card-soft">
        <div class="stock-warning-title">
          ⚠️ 마감 임박! 한정수량:
          <span class="stock-count" id="tw-stock-count">900</span>박스
        </div>
        <div class="stock-warning-sub">
          주문량이 많은 상품으로 조기마감 될 수 있습니다.
        </div>
      </div>
    </div>

    <div class="card-wide">
      <div class="card-inner card-soft">
        <div class="satisfaction-header">
          <div class="satisfaction-title">대한한우 평균만족도</div>
          <div class="satisfaction-badge">전 월 기준</div>
        </div>

        <div class="satisfaction-row">
          <div class="satisfaction-label-row">
            <div class="satisfaction-label">재구매율</div>
          </div>
          <div class="satisfaction-bar">
            <div class="satisfaction-fill" id="tw-repurchase-fill"></div>
          </div>
        </div>

        <div class="satisfaction-row">
          <div class="satisfaction-label-row">
            <div class="satisfaction-label">고객만족도</div>
          </div>
          <div class="satisfaction-bar">
            <div class="satisfaction-fill" id="tw-satisfaction-fill"></div>
          </div>
        </div>

        <div class="satisfaction-row">
          <div class="satisfaction-label-row">
            <div class="satisfaction-label">선물만족도</div>
          </div>
          <div class="satisfaction-bar">
            <div class="satisfaction-fill" id="tw-gift-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    var INITIAL_STOCK = 900;
    var INTERVAL_SEC = 96;
    var DECREASE_BY = 1;

    function calcCurrentStock() {
      var now = new Date();
      var midnight = new Date(now);
      midnight.setHours(0, 0, 0, 0);
      var elapsedSec = (now - midnight) / 1000;
      var decreaseTimes = Math.floor(elapsedSec / INTERVAL_SEC);
      return Math.max(INITIAL_STOCK - decreaseTimes * DECREASE_BY, 0);
    }

    var twStock = calcCurrentStock();

    function twRenderStock(val) {
      if (val !== undefined) twStock = val;
      var el = document.getElementById("tw-stock-count");
      if (el) el.textContent = twStock;
    }

    // 5초마다 체크 / 자정 0~10초 구간이면 초기화
    function twCheckStock() {
      var now = new Date();
      var midnight = new Date(now);
      midnight.setHours(0, 0, 0, 0);
      var elapsedSec = (now - midnight) / 1000;
      if (elapsedSec < 10) {
        twRenderStock(INITIAL_STOCK);
        return;
      }
      var decreaseTimes = Math.floor(elapsedSec / INTERVAL_SEC);
      var calculated = Math.max(INITIAL_STOCK - decreaseTimes * DECREASE_BY, 0);
      if (calculated !== twStock) twRenderStock(calculated);
    }

    function twUpdateTimer() {
      var now = new Date();
      var midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      var remainingMs = midnight - now;
      if (remainingMs < 0) remainingMs = 0;
      var ticks = Math.floor(remainingMs / 100);
      var tenth = ticks % 10;
      var totalSec = Math.floor(ticks / 10);
      var hours = Math.floor(totalSec / 3600);
      var minutes = Math.floor((totalSec % 3600) / 60);
      var secs = totalSec % 60;
      document.getElementById("tw-hours").textContent = String(hours).padStart(
        2,
        "0",
      );
      document.getElementById("tw-minutes").textContent = String(
        minutes,
      ).padStart(2, "0");
      document.getElementById("tw-seconds").textContent = String(secs).padStart(
        2,
        "0",
      );
      document.getElementById("tw-tenth").textContent = String(tenth);
    }

    // =============================================
    // 실시간 뷰어 수 - 시간대별 범위
    // 00~03시:  650~ 950명
    // 03~06시:  330~ 550명
    // 06~09시:  880~1100명
    // 09~12시: 2000~2350명
    // 12~15시: 2700~3050명
    // 15~18시: 4300~4800명
    // 18~21시: 2270~2830명
    // 21~24시: 1113~1550명
    // =============================================
    function twGetViewerRange() {
      var h = new Date().getHours();
      if (h >= 0 && h < 3) return [650, 950];
      if (h >= 3 && h < 6) return [330, 550];
      if (h >= 6 && h < 9) return [880, 1100];
      if (h >= 9 && h < 12) return [2000, 2350];
      if (h >= 12 && h < 15) return [2700, 3050];
      if (h >= 15 && h < 18) return [4300, 4800];
      if (h >= 18 && h < 21) return [2270, 2830];
      return [1113, 1550]; // 21~24시
    }

    var randInt = function (min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    };

    var twViewerCount = (function () {
      var r = twGetViewerRange();
      return randInt(r[0], r[1]);
    })();

    (function initViewer() {
      var el = document.getElementById("tw-viewer-count");
      if (el) el.textContent = twViewerCount.toLocaleString();
    })();

    function twUpdateViewers() {
      var r = twGetViewerRange();
      var pct = (Math.random() * 0.4 + 0.3) / 100;
      var change = Math.max(1, Math.round(twViewerCount * pct));
      var dir = Math.random() < 0.5 ? 1 : -1;
      twViewerCount = Math.min(
        r[1],
        Math.max(r[0], twViewerCount + dir * change),
      );
      var el = document.getElementById("tw-viewer-count");
      if (el) {
        el.textContent = twViewerCount.toLocaleString();
        el.classList.remove("viewer-count-anim");
        void el.offsetWidth;
        el.classList.add("viewer-count-anim");
      }
    }

    // =============================================
    // 만족도 바 애니메이션
    // =============================================
    function twInitSatisfaction() {
      setTimeout(function () {
        var rf = document.getElementById("tw-repurchase-fill");
        var sf = document.getElementById("tw-satisfaction-fill");
        var gf = document.getElementById("tw-gift-fill");
        if (rf) rf.style.width = "92%";
        if (sf) sf.style.width = "97%";
        if (gf) gf.style.width = "86%";
      }, 300);
    }

    twUpdateTimer();
    twUpdateViewers();
    twInitSatisfaction();
    twRenderStock();

    setInterval(twUpdateTimer, 100);
    setInterval(twUpdateViewers, 2000);
    setInterval(twCheckStock, 5000);
  })();
</script>
